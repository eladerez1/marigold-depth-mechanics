# ACR cluster config (read automatically when using: acr run ... --repo <this-repo>)
build:
  dockerfile: Dockerfile
  network: host

run:
  shm_size: "32g"
  volumes:
    - /isilon:/isilon:ro
    # Project tree rw overlay (checkpoints/results writes from training jobs)
    - /isilon/Automotive/RnD/elad.e/Dev/research/marigold_depth_mechanics:/isilon/Automotive/RnD/elad.e/Dev/research/marigold_depth_mechanics:rw
    - /raid/homes/elad.e:/raid/homes/elad.e:ro
  env:
    HF_HOME: /isilon/Automotive/RnD/elad.e/.cache/huggingface
    MARIGOLD_ISILON_ROOT: /isilon/Automotive/RnD/elad.e/Dev/research/marigold_depth_mechanics
